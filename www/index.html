<style>
  :root{
    --ink:#16302b; --paper:#f6f3ec; --card:#fffdf8;
    --weight:#3f6f6a; --sys:#c4543b; --dia:#d99a4e; --dose:#6d5b97;
    --line:#dcd6c8; --mute:#7c8480;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    padding:28px 16px 60px;
  }
  .wrap{max-width:760px;margin:0 auto;}
  .eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--weight);font-weight:600;}
  h1{margin:4px 0 0;font-size:30px;font-weight:700;letter-spacing:-.02em;}
  .sub{margin:8px 0 0;color:var(--mute);font-size:15px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;}
  .row{display:flex;gap:12px;flex-wrap:wrap;}
  label.fld{display:flex;flex-direction:column;gap:6px;flex:1;min-width:0;}
  .lab{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--mute);}
  input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;
    background:var(--paper);font-size:17px;color:var(--ink);outline:none;font-variant-numeric:tabular-nums;}
  textarea{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;
    background:var(--paper);font-size:15px;color:var(--ink);outline:none;font-family:inherit;resize:vertical;min-height:60px;}
  .mt{margin-top:12px;}
  .err{color:var(--sys);font-size:14px;margin-top:12px;}
  .btns{display:flex;gap:10px;margin-top:16px;}
  button{font-family:inherit;cursor:pointer;}
  .primary{flex:1;padding:13px 16px;border:none;border-radius:10px;background:var(--ink);color:var(--paper);font-size:16px;font-weight:600;}
  .ghost{padding:13px 16px;border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--ink);font-size:16px;}
  section.block{margin-top:24px;}
  .chart-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:18px;}
  .chart-title{margin:0 0 10px;font-size:15px;letter-spacing:.04em;text-transform:uppercase;}
  .hist-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .hist-head h2{margin:0;font-size:18px;font-weight:700;}
  .count{color:var(--mute);font-weight:400;}
  .exp{display:flex;gap:8px;}
  .exp .pdf{padding:8px 12px;border:none;border-radius:8px;background:var(--ink);color:var(--paper);font-size:13px;font-weight:600;}
  .exp .csv{padding:8px 12px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);font-size:13px;}
  .entry{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px;}
  .entry .when{font-size:13px;color:var(--mute);margin-bottom:4px;}
  .vals{display:flex;gap:16px;flex-wrap:wrap;font-variant-numeric:tabular-nums;}
  .vals strong{font-size:17px;}
  .unit{color:var(--mute);font-size:13px;}
  .icon{border:none;background:transparent;font-size:16px;color:#9aa19c;padding:6px;line-height:1;}
  .icon.del{color:var(--sys);}
  .empty{color:var(--mute);}
  .foot{margin-top:28px;font-size:12px;color:var(--mute);text-align:center;}
  .banner{background:var(--dose);color:#fff;border-radius:14px;padding:13px 16px;margin-bottom:18px;font-size:14px;font-weight:600;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}
  .banner button{background:rgba(255,255,255,.22);border:none;color:#fff;border-radius:8px;padding:7px 11px;font-size:13px;font-weight:600;}
  .summary .row{gap:20px;}
  .summary .stat{min-width:110px;}
  .summary .stat .k{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--mute);}
  .summary .stat .v{font-size:19px;font-weight:700;margin-top:2px;}
  .goal-row{display:flex;gap:10px;align-items:center;font-size:13px;color:var(--mute);margin-top:14px;flex-wrap:wrap;}
  .goal-row input{width:80px;padding:7px 9px;font-size:14px;}
  .note-txt{font-size:13px;color:var(--ink);margin-top:6px;white-space:pre-wrap;}
  .tag{display:inline-block;font-size:11px;color:var(--mute);background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:2px 6px;margin-top:5px;}
  @media print{
    .no-print{display:none!important;}
    body{background:#fff;padding:0;}
    @page{margin:16mm;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header style="margin-bottom:22px;">
    <div class="eyebrow">Journal de santé</div>
    <h1>Suivi du poids et de la pression</h1>
    <p class="sub">Entre une mesure : la date et l'heure sont enregistrées automatiquement.</p>
  </header>

  <div id="banner" class="banner no-print" style="display:none;"></div>
  <section id="summary" class="card summary no-print" style="display:none;"></section>

  <section class="card no-print">
    <div class="row">
      <label class="fld"><span class="lab">Poids (lbs)</span><input id="weight" inputmode="decimal" placeholder="261.4"></label>
    </div>
    <div class="row mt">
      <label class="fld"><span class="lab">Systolique</span><input id="sys" inputmode="numeric" placeholder="120"></label>
      <label class="fld"><span class="lab">Diastolique</span><input id="dia" inputmode="numeric" placeholder="80"></label>
    </div>
    <div class="row mt">
      <label class="fld"><span class="lab">Dose d'injection (mg)</span><input id="dose" inputmode="decimal" placeholder="0.25 / 0.5 / 1 / 2"></label>
    </div>
    <div class="mt">
      <label class="fld"><span class="lab">Date et heure</span><input id="when" type="datetime-local"></label>
    </div>
    <div class="mt">
      <label class="fld"><span class="lab">Notes</span><textarea id="note" placeholder="Comment tu te sens (nausée, énergie, etc.)"></textarea></label>
    </div>
    <div id="err" class="err" style="display:none;"></div>
    <div class="btns">
      <button id="save" class="primary">Enregistrer</button>
      <button id="cancel" class="ghost" style="display:none;">Annuler</button>
    </div>
  </section>

  <section id="charts" class="block"></section>

  <section class="block">
    <div class="hist-head">
      <h2>Historique <span id="count" class="count"></span></h2>
      <div id="exp" class="exp no-print" style="display:none;">
        <button class="pdf" id="pdf">Télécharger en PDF</button>
        <button class="csv" id="csv">CSV</button>
      </div>
    </div>
    <div id="list"></div>
  </section>

  <p class="foot">Version <span id="appver"></span> — <a href="#" id="checkupd">Vérifier les mises à jour</a></p>
</div>

<script src="jspdf.umd.min.js"></script>
<script>
"use strict";
var KEY = "suivi-sante-entries";
var GOAL_KEY = "suivi-sante-goal";
var NOTIF_KEY = "suivi-sante-last-notif";
var WEIGHT="#3f6f6a", SYS="#c4543b", DIA="#d99a4e", DOSE="#6d5b97", LINE="#dcd6c8", MUTE="#7c8480";
var CAP = (window.Capacitor && window.Capacitor.Plugins) ? window.Capacitor.Plugins : null;
var REMINDER_ID = 9001;
var APP_VERSION = "1.5";
var UPDATE_URL = "https://raw.githubusercontent.com/ChewyQc/suivi-sante-app/main/version.json";

function cmpVer(a,b){
  var pa=String(a).split("."), pb=String(b).split(".");
  for(var i=0;i<Math.max(pa.length,pb.length);i++){
    var na=parseInt(pa[i]||"0",10), nb=parseInt(pb[i]||"0",10);
    if(na>nb) return 1;
    if(na<nb) return -1;
  }
  return 0;
}
function openExternal(url){
  if(CAP && CAP.AppLauncher){
    CAP.AppLauncher.openUrl({url:url}).catch(function(){
      if(CAP.Browser){ CAP.Browser.open({url:url}); } else { window.open(url,"_blank"); }
    });
  }else if(CAP && CAP.Browser){
    CAP.Browser.open({url:url}).catch(function(){ window.open(url,"_blank"); });
  }else{
    window.open(url,"_blank");
  }
}
function checkUpdate(manual){
  fetch(UPDATE_URL+"?t="+Date.now(), {cache:"no-store"})
    .then(function(r){ return r.json(); })
    .then(function(info){
      if(info && info.version && cmpVer(info.version, APP_VERSION)>0){
        var msg = "Nouvelle version "+info.version+" disponible (tu as la version "+APP_VERSION+").";
        if(info.notes){ msg += "\n\nQuoi de neuf : "+info.notes; }
        msg += "\n\nTélécharger la mise à jour maintenant ?";
        if(confirm(msg)){ openExternal(info.apkUrl); }
      }else if(manual){
        alert("Ton app est à jour (version "+APP_VERSION+").");
      }
    })
    .catch(function(){
      if(manual) alert("Impossible de vérifier les mises à jour. Vérifie ta connexion internet.");
    });
}

function syncNativeReminder(lastDose){
  if(!CAP || !CAP.LocalNotifications) return;
  CAP.LocalNotifications.cancel({ notifications:[{id:REMINDER_ID}] }).catch(function(){});
  if(!lastDose) return;
  var nextDate = new Date(new Date(lastDose.ts).getTime()+7*86400000);
  if(nextDate.getTime() <= Date.now()) return;
  CAP.LocalNotifications.requestPermissions().then(function(){
    CAP.LocalNotifications.schedule({
      notifications:[{
        id:REMINDER_ID,
        title:"Rappel injection",
        body:"C'est le jour de ton injection (dernière dose : "+lastDose.dose+" mg).",
        schedule:{ at:nextDate }
      }]
    });
  }).catch(function(){});
}

var entries = load();
var editId = null;

function load(){
  try{
    var raw = localStorage.getItem(KEY);
    if(raw){ return JSON.parse(raw); }
  }catch(e){}
  return [];
}
function save(arr){
  entries = arr;
  try{ localStorage.setItem(KEY, JSON.stringify(arr)); }catch(e){}
}
function loadGoal(){
  try{
    var v = localStorage.getItem(GOAL_KEY);
    return v===null || v===""? null : parseFloat(v);
  }catch(e){ return null; }
}
function saveGoal(v){
  try{
    if(v===null || v===""){ localStorage.removeItem(GOAL_KEY); }
    else{ localStorage.setItem(GOAL_KEY, v); }
  }catch(e){}
}
function escHtml(s){
  return String(s).replace(/[&<>"']/g, function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
  });
}
function csvField(v){
  v = v==null? "" : String(v);
  if(/[",\n]/.test(v)){ v = '"'+v.replace(/"/g,'""')+'"'; }
  return v;
}

function nowLocalInput(){
  var d=new Date(), off=d.getTimezoneOffset();
  return new Date(d.getTime()-off*60000).toISOString().slice(0,16);
}
function toInputVal(iso){
  var d=new Date(iso), off=d.getTimezoneOffset();
  return new Date(d.getTime()-off*60000).toISOString().slice(0,16);
}
function fmtDate(iso){
  return new Date(iso).toLocaleString("fr-CA",{weekday:"short",day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"});
}
function fmtDateShort(iso){
  return new Date(iso).toLocaleDateString("fr-CA",{day:"2-digit",month:"2-digit"});
}

var $ = function(id){ return document.getElementById(id); };
$("when").value = nowLocalInput();

function showErr(msg){
  var e=$("err");
  if(msg){ e.textContent=msg; e.style.display="block"; }
  else{ e.style.display="none"; }
}
function resetForm(){
  $("weight").value=""; $("sys").value=""; $("dia").value=""; $("dose").value=""; $("note").value="";
  $("when").value=nowLocalInput(); editId=null;
  $("save").textContent="Enregistrer";
  $("cancel").style.display="none";
  showErr(null);
}

$("save").onclick=function(){
  var wv=$("weight").value.trim(), sv=$("sys").value.trim(), dv=$("dia").value.trim();
  var dov=$("dose").value.trim(), nv=$("note").value.trim();
  var w = wv===""? null : parseFloat(wv);
  var s = sv===""? null : parseInt(sv,10);
  var d = dv===""? null : parseInt(dv,10);
  var dose = dov===""? null : parseFloat(dov);
  var note = nv===""? null : nv;
  if(w===null && s===null && d===null && dose===null && note===null){ showErr("Entre au moins une mesure, une dose ou une note."); return; }
  if((s!==null&&d===null)||(s===null&&d!==null)){ showErr("La pression a besoin des deux nombres (systolique / diastolique)."); return; }
  var ts = $("when").value ? new Date($("when").value).toISOString() : new Date().toISOString();
  var next;
  if(editId){
    next = entries.map(function(en){ return en.id===editId ? {id:en.id,ts:ts,weight:w,sys:s,dia:d,dose:dose,note:note} : en; });
  }else{
    next = entries.concat([{id:Date.now(),ts:ts,weight:w,sys:s,dia:d,dose:dose,note:note}]);
  }
  save(next); resetForm(); render();
};
$("cancel").onclick=function(){ resetForm(); };

function editEntry(id){
  var en = entries.filter(function(e){return e.id===id;})[0];
  if(!en) return;
  editId=id;
  $("weight").value = en.weight==null?"":en.weight;
  $("sys").value = en.sys==null?"":en.sys;
  $("dia").value = en.dia==null?"":en.dia;
  $("dose").value = en.dose==null?"":en.dose;
  $("note").value = en.note==null?"":en.note;
  $("when").value = toInputVal(en.ts);
  $("save").textContent="Mettre à jour";
  $("cancel").style.display="block";
  window.scrollTo({top:0,behavior:"smooth"});
}

function quickInjection(){
  var doseEntries = entries.filter(function(e){return e.dose!=null;}).sort(function(a,b){return new Date(a.ts)-new Date(b.ts);});
  var lastDoseVal = doseEntries.length? doseEntries[doseEntries.length-1].dose : "";
  resetForm();
  $("dose").value = lastDoseVal;
  $("when").value = nowLocalInput();
  window.scrollTo({top:0,behavior:"smooth"});
  $("dose").focus();
}

function enableReminders(){
  if(!("Notification" in window)) return;
  Notification.requestPermission().then(function(){ render(); });
}
function delEntry(id){
  save(entries.filter(function(e){return e.id!==id;}));
  if(editId===id) resetForm();
  render();
}

function toB64Utf8(str){
  var bytes = new TextEncoder().encode(str);
  var bin=""; for(var i=0;i<bytes.length;i++){ bin += String.fromCharCode(bytes[i]); }
  return btoa(bin);
}
function shareFileNative(fileName, base64Data){
  CAP.Filesystem.writeFile({ path:fileName, data:base64Data, directory:"CACHE" })
    .then(function(res){
      if(CAP.Share){ return CAP.Share.share({ title:fileName, files:[res.uri] }); }
      alert("Fichier enregistré : "+res.uri);
    })
    .catch(function(err){
      if(err && /canceled|cancelled/i.test(String(err.message||err))) return;
      alert("Impossible d'enregistrer le fichier : "+(err && err.message ? err.message : err));
    });
}
function saveFileNative(fileName, base64Data){
  CAP.Filesystem.writeFile({ path:"SuiviSante/"+fileName, data:base64Data, directory:"DOCUMENTS", recursive:true })
    .then(function(){
      alert("Fichier enregistré sur le téléphone dans\nDocuments > SuiviSante :\n\n"+fileName);
    })
    .catch(function(){
      shareFileNative(fileName, base64Data);
    });
}
function buildPdf(){
  var jsPDF = (window.jspdf && window.jspdf.jsPDF) ? window.jspdf.jsPDF : null;
  if(!jsPDF) return null;
  var doc = new jsPDF({unit:"mm", format:"a4"});
  var sorted = entries.slice().sort(function(a,b){return new Date(b.ts)-new Date(a.ts);});
  var pageW = doc.internal.pageSize.getWidth();
  var pageH = doc.internal.pageSize.getHeight();
  var margin = 14, y = 18;
  doc.setFont("helvetica","bold"); doc.setFontSize(16);
  doc.text("Suivi du poids et de la pression", margin, y); y += 6;
  doc.setFont("helvetica","normal"); doc.setFontSize(10); doc.setTextColor(110);
  doc.text("Rapport généré le "+new Date().toLocaleString("fr-CA")+" — "+sorted.length+" entrée(s)", margin, y); y += 9;
  doc.setTextColor(0);
  var cols = [
    {t:"Date", w:24}, {t:"Heure", w:18}, {t:"Poids (lbs)", w:24},
    {t:"Sys", w:14}, {t:"Dia", w:14}, {t:"Dose (mg)", w:22},
    {t:"Notes", w:pageW-2*margin-116}
  ];
  function header(){
    doc.setFont("helvetica","bold"); doc.setFontSize(9);
    var x = margin;
    cols.forEach(function(c){ doc.text(c.t, x, y); x += c.w; });
    y += 2; doc.setDrawColor(170); doc.line(margin, y, pageW-margin, y);
    y += 5; doc.setFont("helvetica","normal");
  }
  header();
  doc.setFontSize(9);
  sorted.forEach(function(e){
    var d = new Date(e.ts);
    var noteLines = e.note==null? [] : doc.splitTextToSize(String(e.note), cols[6].w-2);
    var rowH = Math.max(1, noteLines.length)*4.2 + 2.4;
    if(y + rowH > pageH - 14){ doc.addPage(); y = 18; header(); doc.setFontSize(9); }
    var vals = [
      d.toLocaleDateString("fr-CA"),
      d.toLocaleTimeString("fr-CA",{hour:"2-digit",minute:"2-digit"}),
      e.weight==null?"":String(e.weight), e.sys==null?"":String(e.sys),
      e.dia==null?"":String(e.dia), e.dose==null?"":String(e.dose)
    ];
    var x = margin;
    vals.forEach(function(v,i){ doc.text(v, x, y); x += cols[i].w; });
    if(noteLines.length){ doc.text(noteLines, x, y); }
    y += rowH;
  });
  return doc;
}
$("pdf").onclick=function(){
  var doc = buildPdf();
  if(!doc){ window.print(); return; }
  var fileName = "suivi-sante-"+new Date().toISOString().slice(0,10)+".pdf";
  if(CAP && CAP.Filesystem){
    saveFileNative(fileName, doc.output("datauristring").split(",")[1]);
  }else{
    doc.save(fileName);
  }
};
$("csv").onclick=function(){
  var sorted = entries.slice().sort(function(a,b){return new Date(b.ts)-new Date(a.ts);});
  var head="Date,Heure,Poids (lbs),Systolique,Diastolique,Dose (mg),Notes\n";
  var rows=sorted.map(function(e){
    var d=new Date(e.ts);
    return [d.toLocaleDateString("fr-CA"),
      d.toLocaleTimeString("fr-CA",{hour:"2-digit",minute:"2-digit"}),
      e.weight==null?"":e.weight, e.sys==null?"":e.sys, e.dia==null?"":e.dia,
      e.dose==null?"":e.dose, csvField(e.note)].join(",");
  });
  var csvText = String.fromCharCode(65279)+head+rows.join("\n");
  if(CAP && CAP.Filesystem){
    saveFileNative("suivi-sante-"+new Date().toISOString().slice(0,10)+".csv", toB64Utf8(csvText));
    return;
  }
  var blob=new Blob([csvText],{type:"text/csv"});
  var url=URL.createObjectURL(blob), a=document.createElement("a");
  a.href=url; a.download="suivi-sante.csv"; a.click(); URL.revokeObjectURL(url);
};

// --- Graphique SVG simple ---
function lineChart(data, key, color, label2, color2){
  var W=680, H=200, padL=38, padR=12, padT=12, padB=24;
  var pts = data.filter(function(d){return d[key]!=null;});
  if(pts.length===0) return "";
  var vals=[];
  pts.forEach(function(d){ vals.push(d[key]); if(label2&&d[label2]!=null) vals.push(d[label2]); });
  var min=Math.min.apply(null,vals), max=Math.max.apply(null,vals);
  if(min===max){ min-=2; max+=2; }
  var pad=(max-min)*0.1; min-=pad; max+=pad;
  var n=data.length;
  function X(i){ return padL + (n<=1? (W-padL-padR)/2 : i*(W-padL-padR)/(n-1)); }
  function Y(v){ return padT + (1-(v-min)/(max-min))*(H-padT-padB); }
  function path(k){
    var dd="", started=false;
    data.forEach(function(d,i){
      if(d[k]==null) return;
      dd += (started?"L":"M")+X(i).toFixed(1)+" "+Y(d[k]).toFixed(1)+" ";
      started=true;
    });
    return dd;
  }
  function dots(k,c){
    return data.map(function(d,i){ return d[k]==null?"":'<circle cx="'+X(i).toFixed(1)+'" cy="'+Y(d[k]).toFixed(1)+'" r="3" fill="'+c+'"/>'; }).join("");
  }
  var grid="";
  for(var g=0;g<=3;g++){
    var gy=padT+g*(H-padT-padB)/3;
    var gv=(max-(g*(max-min)/3));
    grid+='<line x1="'+padL+'" y1="'+gy.toFixed(1)+'" x2="'+(W-padR)+'" y2="'+gy.toFixed(1)+'" stroke="'+LINE+'"/>';
    grid+='<text x="4" y="'+(gy+4).toFixed(1)+'" font-size="11" fill="'+MUTE+'">'+gv.toFixed(0)+'</text>';
  }
  var labels=data.map(function(d,i){
    if(n>8 && i%2!==0) return "";
    return '<text x="'+X(i).toFixed(1)+'" y="'+(H-6)+'" font-size="11" fill="'+MUTE+'" text-anchor="middle">'+d.label+'</text>';
  }).join("");
  var svg='<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="200" preserveAspectRatio="xMidYMid meet">';
  svg+=grid+labels;
  svg+='<path d="'+path(key)+'" fill="none" stroke="'+color+'" stroke-width="2.5"/>'+dots(key,color);
  if(label2){ svg+='<path d="'+path(label2)+'" fill="none" stroke="'+color2+'" stroke-width="2.5"/>'+dots(label2,color2); }
  svg+='</svg>';
  return svg;
}

function render(){
  var sorted = entries.slice().sort(function(a,b){return new Date(b.ts)-new Date(a.ts);});
  var asc = entries.slice().sort(function(a,b){return new Date(a.ts)-new Date(b.ts);});
  var chrono = asc.map(function(e){
      return {
        label:new Date(e.ts).toLocaleDateString("fr-CA",{day:"2-digit",month:"2-digit"}),
        weight:e.weight, sys:e.sys, dia:e.dia
      };
    });
  var hasW = entries.some(function(e){return e.weight!=null;});
  var hasBP = entries.some(function(e){return e.sys!=null;});
  var weightEntries = asc.filter(function(e){return e.weight!=null;});
  var doseEntries = asc.filter(function(e){return e.dose!=null;});
  var firstWeight = weightEntries.length? weightEntries[0] : null;
  var lastWeight = weightEntries.length? weightEntries[weightEntries.length-1] : null;
  var lastDose = doseEntries.length? doseEntries[doseEntries.length-1] : null;
  var goal = loadGoal();
  syncNativeReminder(lastDose);

  // --- Bannière rappel d'injection ---
  var bannerHtml = "";
  if(lastDose){
    var nextDate = new Date(new Date(lastDose.ts).getTime()+7*86400000);
    var daysLeft = Math.ceil((nextDate - new Date())/86400000);
    if(daysLeft<=0){
      bannerHtml = '<span>💉 Injection due'+(daysLeft<0?' (en retard de '+Math.abs(daysLeft)+' j)':' aujourd\'hui')+' — dernière dose '+lastDose.dose+' mg le '+fmtDateShort(lastDose.ts)+'</span>'+
        '<button onclick="quickInjection()">Enregistrer</button>';
      if(window.isSecureContext && ("Notification" in window)){
        if(Notification.permission==="default"){
          bannerHtml += ' <button onclick="enableReminders()">🔔 Activer les rappels</button>';
        }else if(Notification.permission==="granted"){
          var today = new Date().toDateString();
          if(localStorage.getItem(NOTIF_KEY)!==today){
            try{
              new Notification("Rappel injection", {body:"Ta prochaine injection est due (dernière dose : "+lastDose.dose+" mg)."});
              localStorage.setItem(NOTIF_KEY, today);
            }catch(e){}
          }
        }
      }
    }else if(daysLeft===1){
      bannerHtml = '<span>💉 Injection prévue demain (dose habituelle : '+lastDose.dose+' mg)</span>';
    }
  }
  $("banner").innerHTML = bannerHtml;
  $("banner").style.display = bannerHtml? "flex":"none";

  // --- Résumé ---
  var statsHtml = "";
  if(lastWeight){ statsHtml += '<div class="stat"><div class="k">Poids actuel</div><div class="v" style="color:'+WEIGHT+'">'+lastWeight.weight+' lbs</div></div>'; }
  if(firstWeight && lastWeight && firstWeight!==lastWeight && firstWeight.weight>0){
    var pct = (firstWeight.weight-lastWeight.weight)/firstWeight.weight*100;
    var pctTxt = pct>=0 ? "-"+pct.toFixed(1)+"%" : "+"+Math.abs(pct).toFixed(1)+"%";
    statsHtml += '<div class="stat"><div class="k">Depuis le début</div><div class="v">'+pctTxt+'</div></div>';
  }
  if(lastWeight && weightEntries.length>1){
    var targetTs = new Date(lastWeight.ts).getTime()-7*86400000;
    var best=null, bestDiff=Infinity;
    weightEntries.forEach(function(e){
      if(e===lastWeight) return;
      var diff=Math.abs(new Date(e.ts).getTime()-targetTs);
      if(diff<bestDiff){bestDiff=diff; best=e;}
    });
    if(best){
      var delta = lastWeight.weight-best.weight;
      statsHtml += '<div class="stat"><div class="k">Tendance 7j</div><div class="v">'+(delta>0?"+":"")+delta.toFixed(1)+' lbs</div></div>';
    }
  }
  if(lastDose){ statsHtml += '<div class="stat"><div class="k">Dose actuelle</div><div class="v" style="color:'+DOSE+'">'+lastDose.dose+' mg</div></div>'; }

  var goalTxt = "";
  if(goal!=null && lastWeight){
    var remaining = lastWeight.weight-goal;
    goalTxt = remaining>0.05 ? remaining.toFixed(1)+" lbs à perdre" : (remaining<-0.05? "Objectif dépassé" : "Objectif atteint 🎉");
  }
  var summaryHtml = "";
  if(statsHtml){
    summaryHtml = '<div class="row">'+statsHtml+'</div>'+
      '<div class="goal-row">Objectif de poids <input id="goalInput" inputmode="decimal" value="'+(goal!=null?goal:"")+'" placeholder="lbs"> <span>'+goalTxt+'</span></div>';
  }
  $("summary").innerHTML = summaryHtml;
  $("summary").style.display = summaryHtml? "block":"none";
  if($("goalInput")){
    $("goalInput").addEventListener("change", function(){
      saveGoal(this.value.trim()); render();
    });
  }

  // Charts
  var ch="";
  if(hasW){
    ch+='<div class="chart-card"><h2 class="chart-title" style="color:'+WEIGHT+'">Poids (lbs)</h2>'+lineChart(chrono,"weight",WEIGHT)+'</div>';
  }
  if(hasBP){
    ch+='<div class="chart-card"><h2 class="chart-title" style="color:'+SYS+'">Pression artérielle</h2>'+lineChart(chrono,"sys",SYS,"dia",DIA)+
        '<div style="font-size:12px;color:'+MUTE+';margin-top:6px;"><span style="color:'+SYS+'">■</span> Systolique &nbsp; <span style="color:'+DIA+'">■</span> Diastolique</div></div>';
  }
  $("charts").innerHTML=ch;

  // Count + export visibility
  $("count").textContent = entries.length>0 ? "("+entries.length+")" : "";
  $("exp").style.display = entries.length>0 ? "flex" : "none";

  // List
  var list=$("list");
  if(sorted.length===0){ list.innerHTML='<p class="empty">Aucune mesure pour l\'instant.</p>'; return; }
  list.innerHTML = sorted.map(function(en){
    var v="";
    if(en.weight!=null) v+='<span><strong style="color:'+WEIGHT+'">'+en.weight+'</strong> <span class="unit">lbs</span></span>';
    if(en.sys!=null) v+='<span><strong style="color:'+SYS+'">'+en.sys+'/'+en.dia+'</strong> <span class="unit">mmHg</span></span>';
    if(en.dose!=null) v+='<span><strong style="color:'+DOSE+'">💉 '+en.dose+'</strong> <span class="unit">mg</span></span>';
    var extra="";
    if(en.note){
      extra += '<div class="note-txt">'+escHtml(en.note)+'</div>';
      if(en.dose==null){
        var priorDoses = doseEntries.filter(function(d){return new Date(d.ts) <= new Date(en.ts);});
        if(priorDoses.length){
          var ld = priorDoses[priorDoses.length-1];
          extra += '<div class="tag">Semaine du '+fmtDateShort(ld.ts)+' · '+ld.dose+' mg</div>';
        }
      }
    }
    return '<div class="entry"><div style="flex:1;min-width:0;"><div class="when">'+fmtDate(en.ts)+'</div><div class="vals">'+v+'</div>'+extra+'</div>'+
      '<button class="icon no-print" onclick="editEntry('+en.id+')" title="Modifier">&#9998;</button>'+
      '<button class="icon del no-print" onclick="delEntry('+en.id+')" title="Supprimer">&#10005;</button></div>';
  }).join("");
}

window.editEntry = editEntry;
window.delEntry = delEntry;
window.quickInjection = quickInjection;
window.enableReminders = enableReminders;
render();

$("appver").textContent = APP_VERSION;
$("checkupd").onclick = function(ev){ ev.preventDefault(); checkUpdate(true); };
if(CAP){ setTimeout(function(){ checkUpdate(false); }, 1500); }

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
